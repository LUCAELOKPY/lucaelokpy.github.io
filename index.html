<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوكا كافيه وبلايستيشن - قنا قوص</title>
    
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .info-bar { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 30px; padding: 10px 25px; margin-bottom: 20px; display: flex; gap: 30px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #ffb84d; font-size: 2.8rem; margin-bottom: 5px; }
        .sub-owner { color: #00f0ff !important; font-weight: bold; font-size: 1.3rem; }
        .selection-box { background-color: #161b22; border: 2px solid #30363d; border-radius: 12px; padding: 30px; width: 90%; max-width: 700px; text-align: center; }
        .buttons-grid { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        .fw-card { background: #21262d; border: 1px solid #444c56; border-radius: 8px; padding: 20px; width: 240px; transition: transform 0.2s; }
        .fw-card:hover { transform: translateY(-5px); border-color: #ffb84d; }
        .btn-exploit { width: 100%; padding: 12px 20px; font-size: 1.1rem; font-weight: bold; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .btn-672 { background: linear-gradient(45deg, #0052d4, #4364f7); }
        .btn-900 { background: linear-gradient(45deg, #f12711, #f5af19); }
        footer { background-color: #161b22; text-align: center; padding: 15px; color: #8b949e; border-top: 1px solid #30363d; margin-top: auto; }
    </style>

    <script>
        function updateClock() {
            var now = new Date();
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('live-date').innerText = now.toLocaleDateString('ar-EG', options);
            document.getElementById('live-time').innerText = now.toLocaleTimeString('ar-EG');
        }

        window.onload = function() {
            updateClock();
            setInterval(updateClock, 1000);
        };

        // التوجه لمسار تعديل ستايل 6.72 المسمى بـ .html.html
        function launch_672() {
            window.location.href = 'ps4jb-master/jailbreak_672.html.html';
        }

        // التوجه لمسار تعديل ستايل 9.00 المسمى بـ psfree.html
        function launch_900() {
            window.location.href = 'PSFree-main/psfree.html'; 
        }
    </script>
</head>
<body>

    <div class="container">
        <div class="info-bar">
            <div>📍 قنا - قوص</div>
            <div>📅 <span id="live-date">...</span></div>
            <div>⏰ <span id="live-time">...</span></div>
        </div>

        <div class="header">
            <h1>لوكا كافيه وبلايستيشن 🎮</h1>
            <p class="sub-owner">إشراف وتطوير: حسين العقبي</p>
        </div>

        <div class="selection-box">
            <div class="buttons-grid">
                <div class="fw-card">
                    <div style="margin-bottom:15px; font-weight:bold;">Firmware 6.72</div>
                    <button class="btn-exploit btn-672" onclick="launch_672()">تفعيل 6.72</button>
                </div>

                <div class="fw-card">
                    <div style="margin-bottom:15px; font-weight:bold;">Firmware 9.00</div>
                    <button class="btn-exploit btn-900" onclick="launch_900()">تفعيل 9.00</button>
                </div>
            </div>
        </div>
    </div>

    <footer>جميع الحقوق محفوظة &copy; 2026 | إدارة الأستاذ حسين العقبي</footer>
</body>
</html>
