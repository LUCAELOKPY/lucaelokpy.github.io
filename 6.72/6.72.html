<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="offlineCache672.manifest">
<head>
    <meta charset="utf-8"/>
    <title>تفعيل جيلبريك 6.72 - لوكا كافيه وبلايستيشن</title>
    <style>
        body {
            background-color: #0b0e14;  
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .titlehead {
            color: #ffb84d;  
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .sub-title {
            color: #00f0ff;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .status-box {
            background-color: #003263;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid #0052d4;
        }

        .button {
            background: linear-gradient(45deg, #0052d4, #4364f7);  
            border: none;
            border-radius: 6px;
            color: white;
            padding: 18px 30px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            display: block;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0, 82, 212, 0.4);
        }

        .button:hover {
            transform: translateY(-3px);
            background: linear-gradient(45deg, #007bff, #00f0ff);
        }

        .stats {
            margin-top: 30px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1rem;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }

        .success-stat { color: #2ecc71; font-weight: bold; }
        .fail-stat { color: #e74c3c; font-weight: bold; }
        
        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="titlehead">لوكا كافيه وبلايستيشن 🎮</h1>
    <div class="sub-title">نظام تفعيل تعديلة سوفت وير 6.72</div>
    
    <div id="progress" class="status-box">جاهز للتفعيل... إضغط على الزر بالأسفل</div>

    <button class="button" onclick="startGoldhenActivation(); return false">تفعيل GoldHEN المباشر</button>

    <div class="stats">
        <span id="success" class="success-stat">نجاح: 0</span>
        <span id="fail" class="fail-stat">فشل: 0</span>
    </div>
    
    <footer>لوكا كافيه وبلايستيشن - قنا قوص &copy; 2026</footer>
</div>

<script src="common/functions.js"></script>
<script>function print(){}</script>
<script src="common/exploit.js"></script>
<script src="jb/jb.js"></script>

<script>
    // تهيئة عدادات التفعيل من ذاكرة المتصفح المحلية عند فتح الصفحة
    window.onload = function(e){
        if(localStorage.Fail == null){ localStorage.Fail = 0; localStorage.Success = 0; }
        document.getElementById("success").innerHTML = "نجاح: " + localStorage.Success;
        document.getElementById("fail").innerHTML = "فشل: " + localStorage.Fail;
    }

    // إدارة ملفات الأوفلاين كاش والتخزين الذكي لجهاز PS4
    window.applicationCache.onchecking = function() { document.getElementById("progress").innerHTML = "جاري فحص ملفات السيرفر..."; };
    window.applicationCache.ondownloading = function() { document.getElementById("progress").innerHTML = "جاري تحميل ملفات الأوفلاين للعمل بدون إنترنت..."; };
    window.applicationCache.onprogress = function(a) { document.getElementById("progress").innerHTML = "جاري التخزين المحلي: " + (Math.round(100 * (a.loaded / a.total))) + "%" };
    window.applicationCache.oncached = function() { document.getElementById("progress").innerHTML = "تم حفظ التعديل بنجاح! افصل كابل النت وافتح المتصفح أوفلاين."; };
    window.applicationCache.onupdateready = function() { window.applicationCache.swapCache(); window.location.reload(); };
    window.applicationCache.onnoupdate = function() { document.getElementById("progress").innerHTML = "جاهز للتفعيل الفوري (تم الكاش مسبقاً) 🚀"; };
    window.applicationCache.onerror = function() { document.getElementById("progress").innerHTML = "تنبيه: تعمل الآن في الوضع المحلي/أوفلاين."; };

    // دالة التشغيل الذكية التي تمنع التجميد وتعالج الحقن بالترتيب
    function startGoldhenActivation() {
        document.getElementById("progress").innerHTML = "جاري تهيئة ذاكرة المعالج وتشغيل الجيلبريك...";
        
        setTimeout(function(){
            try {
                // خطوة 1: استدعاء دالة الجيلبريك الأساسية الممررة من jb.js
                if (typeof jb === "function") {
                    
                    // خطوة 2: إنشاء عنصر تحميل ديناميكي لملف payloads/goldhen.js
                    var script = document.createElement('script');
                    script.src = "payloads/goldhen.js";
                    
                    script.onload = function() {
                        document.getElementById("progress").innerHTML = "جاري حقن بايتات الـ GoldHEN... انتظر رسالة النجاح.";
                        
                        // خطوة 3: تشغيل التعديل الفعلي وتحديث العداد في حالة النجاح
                        setTimeout(function(){
                            localStorage.Success = parseInt(localStorage.Success) + 1;
                            document.getElementById("success").innerHTML = "نجاح: " + localStorage.Success;
                            document.getElementById("progress").innerHTML = "تم التفعيل بنجاح! انتظر ظهور إشعار GoldHEN على الشاشة ثم اخرج.";
                        }, 1500);
                    };
                    
                    script.onerror = function() {
                        localStorage.Fail = parseInt(localStorage.Fail) + 1;
                        document.getElementById("fail").innerHTML = "فشل: " + localStorage.Fail;
                        document.getElementById("progress").innerHTML = "خطأ: لم يتم العثور على ملف payloads/goldhen.js في مستودعك.";
                    };
                    
                    // إدراج السكريبت لبدء التنفيذ الفوري
                    document.body.appendChild(script);
                    
                } else {
                    document.getElementById("progress").innerHTML = "خطأ: دالة jb() غير معرفة، تأكد من سلامة ملف jb.js";
                }
            } catch(err) {
                localStorage.Fail = parseInt(localStorage.Fail) + 1;
                document.getElementById("fail").innerHTML = "فشل: " + localStorage.Fail;
                document.getElementById("progress").innerHTML = "حدث تعليق بالذاكرة الكاش: " + err.message + ". أعد فتح المتصفح.";
            }
        }, 600); // مهلة أمان مخصصة لمنع الـ Kernel Panic والـ Freeze
    }
</script>
</body>
</html>
